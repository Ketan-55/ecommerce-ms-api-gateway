server:
  port: 8082
spring:
  application:
    name: api-gateway
    server:
      port: 8082
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/user/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
